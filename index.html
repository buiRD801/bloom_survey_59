<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>如光公益 第59期 族群分析</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f3;
    --surface: #ffffff;
    --surface2: #f0f0ee;
    --border: rgba(0,0,0,0.08);
    --text-primary: #1a1a1a;
    --text-muted: #888890;
    --accent-teal: #0d9e72;
    --accent-purple: #7c5cda;
    --accent-blue: #2e7dd1;
    --accent-coral: #e05a3a;
    --accent-amber: #d09010;
    --accent-gray: #8a8e99;
    --radius: 16px;
  }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    padding: 40px 32px 60px;
  }

  .header {
    display: flex;
    align-items: baseline;
    gap: 20px;
    margin-bottom: 40px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .header-title {
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 0.04em;
    color: var(--text-primary);
  }

  .header-subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
  }

  .kpi-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }

  .kpi {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 22px;
    position: relative;
    overflow: hidden;
  }

  .kpi::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .kpi.teal::before { background: var(--accent-teal); }
  .kpi.purple::before { background: var(--accent-purple); }
  .kpi.blue::before { background: var(--accent-blue); }
  .kpi.coral::before { background: var(--accent-coral); }

  .kpi-number {
    font-family: 'DM Mono', monospace;
    font-size: 36px;
    font-weight: 500;
    line-height: 1;
    margin-bottom: 6px;
  }

  .kpi.teal .kpi-number { color: var(--accent-teal); }
  .kpi.purple .kpi-number { color: var(--accent-purple); }
  .kpi.blue .kpi-number { color: var(--accent-blue); }
  .kpi.coral .kpi-number { color: var(--accent-coral); }

  .kpi-label {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
  }

  .kpi-sub {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
    opacity: 0.7;
  }

  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  .grid-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  .grid-full {
    margin-bottom: 16px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
  }

  .card-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 14px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-muted);
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .chart-wrap {
    position: relative;
    width: 100%;
  }

  .donut-wrap {
    position: relative;
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .donut-canvas {
    flex-shrink: 0;
  }

  .donut-legend {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .donut-legend-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
  }

  .donut-legend-left {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-muted);
  }

  .donut-legend-bar {
    width: 3px;
    height: 16px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .donut-legend-value {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
  }

  .footer-row {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .footer-text {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
  }
</style>
</head>
<body>

<div class="header">
  <span class="header-title">如光公益 · 第 59 期</span>
  <span class="header-subtitle">N = 45 · COHORT ANALYSIS</span>
</div>

<div class="kpi-row">
  <div class="kpi teal">
    <div class="kpi-number">45</div>
    <div class="kpi-label">總報名人數</div>
  </div>
  <div class="kpi purple">
    <div class="kpi-number">75.6%</div>
    <div class="kpi-label">現任教練比例</div>
    <div class="kpi-sub">34 / 45</div>
  </div>
  <div class="kpi blue">
    <div class="kpi-number">95.6%</div>
    <div class="kpi-label">中國大陸學員</div>
    <div class="kpi-sub">43 / 45</div>
  </div>
  <div class="kpi coral">
    <div class="kpi-number">64.4%</div>
    <div class="kpi-label">WeChat 主要通訊</div>
    <div class="kpi-sub">29 / 45</div>
  </div>
</div>

<div class="grid-3">
  <div class="card">
    <div class="card-label">ICF 認證等級</div>
    <div class="donut-wrap">
      <canvas id="icfChart" width="140" height="140" class="donut-canvas"></canvas>
      <div class="donut-legend">
        <div class="donut-legend-item">
          <div class="donut-legend-left"><div class="donut-legend-bar" style="background:#2dd4a0"></div>PCC</div>
          <div class="donut-legend-value">18</div>
        </div>
        <div class="donut-legend-item">
          <div class="donut-legend-left"><div class="donut-legend-bar" style="background:#a78bfa"></div>學習中</div>
          <div class="donut-legend-value">13</div>
        </div>
        <div class="donut-legend-item">
          <div class="donut-legend-left"><div class="donut-legend-bar" style="background:#60a5fa"></div>ACC</div>
          <div class="donut-legend-value">8</div>
        </div>
        <div class="donut-legend-item">
          <div class="donut-legend-left"><div class="donut-legend-bar" style="background:#9ca3af"></div>尚未起步</div>
          <div class="donut-legend-value">5</div>
        </div>
        <div class="donut-legend-item">
          <div class="donut-legend-left"><div class="donut-legend-bar" style="background:#fb7c6a"></div>MCC</div>
          <div class="donut-legend-value">1</div>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-label">通訊軟體偏好</div>
    <div class="donut-wrap">
      <canvas id="appChart" width="140" height="140" class="donut-canvas"></canvas>
      <div class="donut-legend">
        <div class="donut-legend-item">
          <div class="donut-legend-left"><div class="donut-legend-bar" style="background:#a78bfa"></div>WeChat</div>
          <div class="donut-legend-value">29</div>
        </div>
        <div class="donut-legend-item">
          <div class="donut-legend-left"><div class="donut-legend-bar" style="background:#2dd4a0"></div>Line</div>
          <div class="donut-legend-value">10</div>
        </div>
        <div class="donut-legend-item">
          <div class="donut-legend-left"><div class="donut-legend-bar" style="background:#60a5fa"></div>兩者皆用</div>
          <div class="donut-legend-value">6</div>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-label">是否從事教練工作</div>
    <div class="donut-wrap">
      <canvas id="coachChart" width="140" height="140" class="donut-canvas"></canvas>
      <div class="donut-legend">
        <div class="donut-legend-item">
          <div class="donut-legend-left"><div class="donut-legend-bar" style="background:#2dd4a0"></div>是的</div>
          <div class="donut-legend-value">34</div>
        </div>
        <div class="donut-legend-item">
          <div class="donut-legend-left"><div class="donut-legend-bar" style="background:#9ca3af"></div>不是</div>
          <div class="donut-legend-value">9</div>
        </div>
        <div class="donut-legend-item">
          <div class="donut-legend-left"><div class="donut-legend-bar" style="background:#fbbf24"></div>其他</div>
          <div class="donut-legend-value">2</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="grid-2">
  <div class="card">
    <div class="card-label">教練時數分佈</div>
    <div class="chart-wrap" style="height: 240px;">
      <canvas id="hoursChart"></canvas>
    </div>
  </div>

  <div class="card">
    <div class="card-label">資訊來源管道</div>
    <div class="chart-wrap" style="height: 240px;">
      <canvas id="sourceChart"></canvas>
    </div>
  </div>
</div>

<div class="grid-2">
  <div class="card">
    <div class="card-label">近期公益活動參與</div>
    <div class="chart-wrap" style="height: 200px;">
      <canvas id="volChart"></canvas>
    </div>
  </div>

  <div class="card">
    <div class="card-label">感興趣的課程（前 5 名）</div>
    <div class="chart-wrap" style="height: 200px;">
      <canvas id="courseChart"></canvas>
    </div>
  </div>
</div>

<div class="grid-full">
  <div class="card">
    <div class="card-label">近期參與如光活動</div>
    <div class="chart-wrap" style="height: 180px;">
      <canvas id="actChart"></canvas>
    </div>
  </div>
</div>

<div class="footer-row">
  <span class="footer-text">如光公益國際學院 · 2025</span>
</div>

<script>
const muted = '#888890';
const grid = 'rgba(0,0,0,0.06)';
const teal = '#0d9e72';
const purple = '#7c5cda';
const blue = '#2e7dd1';
const coral = '#e05a3a';
const amber = '#d09010';
const gray = '#8a8e99';
const dark = '#1a1a1a';

const baseOpts = (horizontal = false) => ({
  responsive: true,
  maintainAspectRatio: false,
  plugins: { legend: { display: false }, tooltip: {
    backgroundColor: '#ffffff',
    titleColor: dark,
    bodyColor: muted,
    borderColor: 'rgba(0,0,0,0.1)',
    borderWidth: 1,
    padding: 10,
    titleFont: { family: "'DM Mono', monospace", size: 11 },
    bodyFont: { family: "'Noto Sans TC', sans-serif", size: 12 }
  }},
  scales: {
    x: {
      grid: { color: horizontal ? grid : 'transparent' },
      ticks: { color: muted, font: { family: "'Noto Sans TC', sans-serif", size: 11 } },
      border: { display: false }
    },
    y: {
      grid: { color: horizontal ? 'transparent' : grid },
      ticks: { color: muted, font: { family: "'Noto Sans TC', sans-serif", size: 11 } },
      border: { display: false }
    }
  }
});

const donutOpts = {
  responsive: false,
  cutout: '68%',
  plugins: { legend: { display: false }, tooltip: {
    backgroundColor: '#ffffff',
    titleColor: dark,
    bodyColor: muted,
    borderColor: 'rgba(0,0,0,0.1)',
    borderWidth: 1,
    padding: 10,
    titleFont: { family: "'DM Mono', monospace", size: 11 },
    bodyFont: { family: "'Noto Sans TC', sans-serif", size: 12 }
  }}
};

new Chart(document.getElementById('icfChart'), {
  type: 'doughnut',
  data: {
    labels: ['PCC', '正在學習路上', 'ACC', '尚未起步', 'MCC'],
    datasets: [{ data: [18, 13, 8, 5, 1], backgroundColor: [teal, purple, blue, gray, coral], borderWidth: 0, hoverOffset: 4 }]
  },
  options: donutOpts
});

new Chart(document.getElementById('appChart'), {
  type: 'doughnut',
  data: {
    labels: ['WeChat', 'Line', '兩者皆用'],
    datasets: [{ data: [29, 10, 6], backgroundColor: [purple, teal, blue], borderWidth: 0, hoverOffset: 4 }]
  },
  options: donutOpts
});

new Chart(document.getElementById('coachChart'), {
  type: 'doughnut',
  data: {
    labels: ['是的', '不是', '其他'],
    datasets: [{ data: [34, 9, 2], backgroundColor: [teal, gray, amber], borderWidth: 0, hoverOffset: 4 }]
  },
  options: donutOpts
});

const hoursOpts = { ...baseOpts(true), indexAxis: 'y' };
new Chart(document.getElementById('hoursChart'), {
  type: 'bar',
  data: {
    labels: ['701-1000h', '0-100h', '101-200h', '201-300h', '其他', '501-700h', '401-500h', '301-400h'],
    datasets: [{
      data: [13, 9, 5, 5, 5, 4, 2, 2],
      backgroundColor: (ctx) => {
        const i = ctx.dataIndex;
        const alpha = 1 - (i * 0.1);
        return `rgba(96, 165, 250, ${Math.max(alpha, 0.35)})`;
      },
      borderRadius: 4, borderSkipped: false
    }]
  },
  options: hoursOpts
});

new Chart(document.getElementById('sourceChart'), {
  type: 'bar',
  data: {
    labels: ['WeChat群組', '朋友推薦', 'Line', '其他', '微信公眾號', 'Facebook', '官網', 'LinkedIn'],
    datasets: [{
      data: [17, 8, 8, 5, 4, 2, 1, 1],
      backgroundColor: (ctx) => {
        const i = ctx.dataIndex;
        const alpha = 1 - (i * 0.1);
        return `rgba(45, 212, 160, ${Math.max(alpha, 0.3)})`;
      },
      borderRadius: 4, borderSkipped: false
    }]
  },
  options: baseOpts(false)
});

const volOpts = { ...baseOpts(false) };
new Chart(document.getElementById('volChart'), {
  type: 'bar',
  data: {
    labels: ['公益教練服務', '在非營利工作', '其他公益行動', '其他'],
    datasets: [{
      data: [31, 9, 8, 6],
      backgroundColor: [purple, 'rgba(167,139,250,0.6)', 'rgba(167,139,250,0.45)', 'rgba(167,139,250,0.3)'],
      borderRadius: 6, borderSkipped: false
    }]
  },
  options: volOpts
});

new Chart(document.getElementById('courseChart'), {
  type: 'bar',
  data: {
    labels: ['暫無規劃', '3CCs 倫理', '應用心理學', '觀察力精進', '黃金人生'],
    datasets: [{
      data: [21, 9, 5, 5, 4],
      backgroundColor: [gray, coral, 'rgba(251,124,106,0.7)', 'rgba(251,124,106,0.55)', 'rgba(251,124,106,0.4)'],
      borderRadius: 6, borderSkipped: false
    }]
  },
  options: baseOpts(false)
});

const actOpts = { ...baseOpts(false) };
new Chart(document.getElementById('actChart'), {
  type: 'bar',
  data: {
    labels: ['尚未參與', '如光公益活動', '3CCs 倫理研討', '其他', 'Group Mentor Coaching'],
    datasets: [{
      data: [18, 12, 12, 5, 3],
      backgroundColor: [gray, teal, 'rgba(45,212,160,0.65)', 'rgba(45,212,160,0.45)', 'rgba(45,212,160,0.3)'],
      borderRadius: 6, borderSkipped: false
    }]
  },
  options: actOpts
});
</script>
</body>
</html>
